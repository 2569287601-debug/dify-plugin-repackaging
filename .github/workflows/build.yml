name: Repackage Dify Plugin
on:
  workflow_dispatch:
    inputs:
      author:
        description: Plugin Author
        required: true
        default: langgenius
      plugin:
        description: Plugin Name
        required: true
        default: seedream-aigc
      version:
        description: Plugin Version
        required: true
        default: 0.0.1

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y curl unzip

      - name: Fix script line break & grant permission
        run: |
          sed -i 's/\r$//' plugin_repackaging.sh
          chmod +x ./plugin_repackaging.sh

      - name: Repackage Seedream AIGC Plugin
        run: ./plugin_repackaging.sh market ${{ github.event.inputs.author }} ${{ github.event.inputs.plugin }} ${{ github.event.inputs.version }}

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: seedream-offline-plugin
          path: "*.difypkg"
